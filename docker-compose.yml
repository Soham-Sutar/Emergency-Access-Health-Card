version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: health-chain-db
    environment:
      POSTGRES_USER: ${DB_USER:-healthchain_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-health_chain_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthchain_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-chain-network

  adminer:
    image: adminer:latest
    container_name: health-chain-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - health-chain-network

volumes:
  postgres_data:

networks:
  health-chain-network:
    driver: bridge
